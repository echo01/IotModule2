<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MQTT Config</title>
  <style>
    body{font-family:Raleway,Segoe UI,sans-serif;background:#eef2f7;margin:0}
    .top{background:#111827;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .nav a{color:#c7d2fe;text-decoration:none;margin-right:12px;font-weight:600}
    .wrap{max-width:760px;margin:16px auto;padding:0 12px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 8px 18px rgba(0,0,0,.08)}
    label{display:block;font-weight:600;margin:10px 0 6px}
    input{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px}
    button{margin-top:14px;padding:10px 14px;border:0;border-radius:8px;background:#0f766e;color:#fff;font-weight:700;cursor:pointer}
    .msg{margin-top:10px;color:#0f172a}
    .pw{display:grid;grid-template-columns:1fr 44px;gap:8px;align-items:center}
    .eye{padding:10px 0;background:#334155;color:#fff;border-radius:8px;border:0;cursor:pointer}
    .summary{padding:10px;border:1px dashed #94a3b8;border-radius:8px;background:#f8fafc;color:#334155;margin-bottom:10px}
  </style>
</head>
<body>
  <div class="top">
    <div><strong>MQTT Broker Config</strong></div>
    <div class="nav">
      <a href="/index.html">Dashboard</a>
      <a href="/mqtt_setting.html">MQTT Config</a>
      <a href="/network_setting.html">Network Config</a>
      <a href="/mems_setting.html">MEMS Config</a>
      <a href="/system_setting.html">System</a>
    </div>
  </div>

  <div class="wrap"><div class="card">
    <div class="summary" id="summary">Current: loading...</div>
    <form id="f">
      <label>Broker</label><input name="broker" required>
      <label>Port</label><input name="port" type="number" min="1" max="65535" value="1883">
      <label>Client ID</label><input name="client_id">
      <label>Username</label><input name="username">
      <label>Password</label>
      <div class="pw"><input id="mqtt_password" name="password" type="password"><button type="button" class="eye" id="toggleMqttPw">&#128065;</button></div>
      <label>Topic Main Payload</label><input name="topic_publish" placeholder="viot/vibration">
      <label>Topic FFT X</label><input name="topic_fft_x" placeholder="viot/vibration/fft/x">
      <label>Topic FFT Y</label><input name="topic_fft_y" placeholder="viot/vibration/fft/y">
      <label>Topic FFT Z</label><input name="topic_fft_z" placeholder="viot/vibration/fft/z">
      <label>Topic Subscribe</label><input name="topic_subscribe">
      <label>Publish Interval (sec)</label><input name="publish_interval_s" type="number" min="1" max="3600">
      <button type="submit">Save MQTT Config</button>
    </form>
    <div class="msg" id="msg"></div>
  </div></div>
<script>
const f=document.getElementById('f');
const msg=document.getElementById('msg');
const summary=document.getElementById('summary');
function setv(name,v){const e=f.querySelector(`[name="${name}"]`); if(e) e.value=v||'';}

function renderSummary(c){
  summary.textContent = `Current Broker: ${c.mqtt?.broker || '-'}:${c.mqtt?.port || '-'} | Main: ${c.mqtt?.topic_publish || 'viot/vibration'} | FFT X/Y/Z: ${c.mqtt?.topic_fft_x || 'viot/vibration/fft/x'} | ${c.mqtt?.topic_fft_y || 'viot/vibration/fft/y'} | ${c.mqtt?.topic_fft_z || 'viot/vibration/fft/z'} | Interval: ${c.mqtt?.publish_interval_s || 60}s | Status: ${c.mqtt?.status || '-'}`;
}

fetch('/api/config').then(r=>r.json()).then(c=>{
  setv('broker', c.mqtt?.broker); setv('port', c.mqtt?.port||1883);
  setv('client_id', c.mqtt?.client_id); setv('username', c.mqtt?.username);
  setv('password', c.mqtt?.password); setv('topic_publish', c.mqtt?.topic_publish);
  setv('topic_fft_x', c.mqtt?.topic_fft_x || 'viot/vibration/fft/x');
  setv('topic_fft_y', c.mqtt?.topic_fft_y || 'viot/vibration/fft/y');
  setv('topic_fft_z', c.mqtt?.topic_fft_z || 'viot/vibration/fft/z');
  setv('topic_subscribe', c.mqtt?.topic_subscribe);
  setv('publish_interval_s', c.mqtt?.publish_interval_s || 60);
  renderSummary(c);
}).catch(()=>{ summary.textContent='Current: unavailable'; });

document.getElementById('toggleMqttPw').onclick=()=>{
  const p=document.getElementById('mqtt_password');
  const show=p.type==='password'; p.type=show?'text':'password';
  document.getElementById('toggleMqttPw').innerHTML=show?'&#128064;':'&#128065;';
};

f.onsubmit=async (e)=>{
  e.preventDefault();
  const fd=new FormData(f);
  const res=await fetch('/api/mqtt_config',{method:'POST',body:fd});
  const t=await res.text();
  msg.textContent = res.ok ? 'Saved. Reboot device to use new broker settings.' : `Save failed: ${t}`;
};
</script>
</body>
</html>
