<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MEMS Config</title>
  <style>
    body{font-family:Raleway,Segoe UI,sans-serif;background:#eef2f7;margin:0}
    .top{background:#111827;color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
    .nav a{color:#c7d2fe;text-decoration:none;margin-right:12px;font-weight:600}
    .wrap{max-width:860px;margin:16px auto;padding:0 12px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 8px 18px rgba(0,0,0,.08)}
    label{display:block;font-weight:600;margin:8px 0 6px}
    input,select{width:100%;padding:10px;border:1px solid #cbd5e1;border-radius:8px}
    .row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
    @media(max-width:740px){.row{grid-template-columns:1fr}}
    button{margin-top:14px;padding:10px 14px;border:0;border-radius:8px;background:#0f766e;color:#fff;font-weight:700;cursor:pointer}
    .msg{margin-top:10px}
  </style>
</head>
<body>
  <div class="top">
    <div><strong>MEMS Sensor Config</strong></div>
    <div class="nav">
      <a href="/index.html">Dashboard</a>
      <a href="/fft_chart.html">FFT Chart</a>
      <a href="/mqtt_setting.html">MQTT Config</a>
      <a href="/network_setting.html">Network Config</a>
      <a href="/operate_config.html">Operate Config</a>
      <a href="/mems_setting.html">MEMS Config</a>
      <a href="/system_setting.html">System</a>
    </div>
  </div>

  <div class="wrap"><div class="card">
    <form id="f">
      <label>Measurement Bandwidth (Hz)</label>
      <select name="bandwidth_hz">
        <option value="800">800 Hz</option>
        <option value="400">400 Hz</option>
        <option value="200">200 Hz</option>
      </select>
      <div class="msg">ADXL345 output data rate is internally set to 2x the selected bandwidth.</div>
      <label>Range (G)</label>
      <select name="range_g"><option value="2">2G</option><option value="4">4G</option><option value="8">8G</option><option value="16">16G</option></select>

      <label>Offset Calibration (G)</label>
      <div class="row">
        <div><label>X Offset</label><input type="number" step="0.001" name="offset_x"></div>
        <div><label>Y Offset</label><input type="number" step="0.001" name="offset_y"></div>
        <div><label>Z Offset</label><input type="number" step="0.001" name="offset_z"></div>
      </div>
      <button type="submit">Save MEMS Config</button>
    </form>
    <div class="msg" id="msg"></div>
  </div></div>
<script>
const f=document.getElementById('f'); const msg=document.getElementById('msg');
function setv(name,v){const e=f.querySelector(`[name="${name}"]`); if(e) e.value=v??'';}
function rateToBandwidth(rateHz){
  const rate = Number(rateHz) || 800;
  if (rate <= 400) return 200;
  if (rate <= 800) return 400;
  return 800;
}
function bandwidthToRate(bandwidthHz){
  const bandwidth = Number(bandwidthHz) || 400;
  if (bandwidth <= 200) return 400;
  if (bandwidth <= 400) return 800;
  return 1600;
}
fetch('/api/config').then(r=>r.json()).then(c=>{
  setv('bandwidth_hz', rateToBandwidth(c.adxl345?.rate_hz || 800));
  setv('range_g', c.adxl345?.range_g || 16);
  setv('offset_x', c.adxl345?.offset_x || 0);
  setv('offset_y', c.adxl345?.offset_y || 0);
  setv('offset_z', c.adxl345?.offset_z || 0);
}).catch(()=>{});

f.onsubmit=async (e)=>{
  e.preventDefault();
  const fd=new FormData();
  fd.append('rate_hz', String(bandwidthToRate(f.bandwidth_hz.value)));
  fd.append('range_g', f.range_g.value);
  fd.append('offset_x', f.offset_x.value);
  fd.append('offset_y', f.offset_y.value);
  fd.append('offset_z', f.offset_z.value);
  const res=await fetch('/api/mems_config',{method:'POST',body:fd});
  const t=await res.text();
  msg.textContent = res.ok ? 'MEMS config saved and applied.' : `Save failed: ${t}`;
};
</script>
</body>
</html>
